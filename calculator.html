<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        .calculator { border: 2px solid #333; width: 300px; margin: 0 auto; padding: 20px; border-radius: 10px; }
        input[type="text"] { width: 90%; height: 50px; font-size: 24px; text-align: right; margin: 10px 0; }
        .btn { width: 60px; height: 50px; font-size: 18px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background-color: #ddd; }
        .operator { background-color: #ff9500; color: white; }
        .equals { background-color: #28a745; color: white; }
        .clear { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" readonly>
        <br>
        <input type="button" class="btn clear" value="C" onclick="clearResult()">
        <input type="button" class="btn" value="⌫" onclick="deleteLast()">
        <input type="button" class="btn operator" value="/" onclick="addToResult('/')">
        <input type="button" class="btn operator" value="×" onclick="addToResult('*')">
        <br>
        <input type="button" class="btn" value="4" onclick="addToResult('4')">
        <input type="button" class="btn" value="5" onclick="addToResult('5')">
        <input type="button" class="btn" value="6" onclick="addToResult('6')">
        <input type="button" class="btn operator" value="+" onclick="addToResult('+')">
        <br>
        <input type="button" class="btn" value="1" onclick="addToResult('1')">
        <input type="button" class="btn" value="2" onclick="addToResult('2')">
        <input type="button" class="btn" value="3" onclick="addToResult('3')">
        <input type="button" class="btn equals" value="=" onclick="calculate()" style="width: 130px;">
        <br>
        <input type="button" class="btn" value="0" onclick="addToResult('0')" style="width: 130px;">
        <input type="button" class="btn" value="." onclick="addToResult('.')">
    </div>

    <script>
        let result = document.getElementById('result');
        
        function addToResult(value) {
            result.value += value;
        }
        
        function clearResult() {
            result.value = '';
        }
        
        function deleteLast() {
            result.value = result.value.slice(0, -1);
        }
        
        function calculate() {
            try {
                result.value = eval(result.value);
            } catch {
                result.value = 'Error';
            }
        }
    </script>
</body>
</html>
